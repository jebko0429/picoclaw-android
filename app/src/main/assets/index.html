<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PicoClaw Client</title>
  <style>
    :root {
      --bg: #0f141a;
      --panel: #161d27;
      --card: #1e2733;
      --text: #e8eef6;
      --muted: #9ab0c7;
      --accent: #4fc3f7;
      --accent-2: #8bc34a;
      --danger: #ef5350;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 320px;
      background: var(--panel);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-right: 1px solid #1f2933;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 12px;
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    input, textarea, button, select {
      width: 100%;
      border: 1px solid #24303d;
      background: #111824;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--accent), #6ae0ff);
      color: #041019;
      font-weight: 700;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    button:active { transform: translateY(1px); }
    .btn-secondary { background: #24303d; color: var(--text); }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { flex: 1; }
    .card {
      background: var(--card);
      border: 1px solid #1f2933;
      border-radius: var(--radius);
      padding: 14px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 6px;
    }
    .status-ok { background: var(--accent-2); }
    .status-bad { background: var(--danger); }
    .status-unknown { background: #6c7785; }
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 4px;
    }
    .bubble {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .me { align-self: flex-end; background: #2b3745; }
    .bot { align-self: flex-start; background: #0f1926; border: 1px solid #24303d; }
    .timestamp { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .logs { max-height: 150px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); }
    .topbar { display: flex; justify-content: space-between; align-items: center; }
    a { color: var(--accent); text-decoration: none; }
    .small { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div>
      <h1>PicoClaw</h1>
      <div class="small">Remote backend client</div>
    </div>
    <div class="card">
      <label for="host">Backend Host</label>
      <input id="host" type="text" placeholder="demo.picoclaw.io" />
      <div class="row" style="margin-top:8px;">
        <div>
          <label for="port">Port</label>
          <input id="port" type="number" min="1" max="65535" placeholder="11434" />
        </div>
        <div>
          <label for="scheme">Scheme</label>
          <select id="scheme">
            <option value="http">http</option>
            <option value="https">https</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="save">Save</button>
        <button id="test" class="btn-secondary">Test</button>
      </div>
      <div id="conn-status" class="small" style="margin-top:8px;">
        <span class="status-dot status-unknown"></span>Unknown
      </div>
    </div>
    <div class="card">
      <div class="row">
        <button id="quick-hello" class="btn-secondary">Hello</button>
        <button id="quick-help" class="btn-secondary">What can you do?</button>
      </div>
    </div>
    <div class="card logs" id="logs"></div>
    <div class="small">Tip: the UI runs locally; only API calls hit your backend.</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="small">Current backend</div>
        <div id="current-backend" style="font-weight:700;">-</div>
      </div>
      <div class="small" id="latency">–</div>
    </div>

    <div id="messages" class="card">
      <!-- chat bubbles injected here -->
    </div>

    <div class="card">
      <label for="prompt">Message</label>
      <textarea id="prompt" rows="3" placeholder="Ask PicoClaw anything..."></textarea>
      <div class="row" style="margin-top:10px;">
        <button id="send">Send</button>
        <button id="clear" class="btn-secondary">Clear chat</button>
      </div>
    </div>
  </main>

  <script>
    const el = (id) => document.getElementById(id);
    const logsEl = el("logs");
    const messagesEl = el("messages");
    const promptEl = el("prompt");
    const currentEl = el("current-backend");
    const statusEl = el("conn-status");
    const latencyEl = el("latency");

    const defaultCfg = {
      host: "demo.picoclaw.io",
      port: 11434,
      scheme: "http",
    };

    function log(line) {
      const ts = new Date().toLocaleTimeString();
      logsEl.textContent += `[${ts}] ${line}\n`;
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    function saveCfg(cfg) {
      localStorage.setItem("picoCfg", JSON.stringify(cfg));
      applyCfg(cfg);
    }

    function loadCfg() {
      try {
        return { ...defaultCfg, ...JSON.parse(localStorage.getItem("picoCfg") || "{}") };
      } catch (_) {
        return defaultCfg;
      }
    }

    function applyCfg(cfg) {
      el("host").value = cfg.host;
      el("port").value = cfg.port;
      el("scheme").value = cfg.scheme;
      currentEl.textContent = `${cfg.scheme}://${cfg.host}:${cfg.port}`;
    }

    function status(color, text) {
      statusEl.innerHTML = `<span class="status-dot ${color}"></span>${text}`;
    }

    function addBubble(text, who = "bot") {
      const wrap = document.createElement("div");
      wrap.className = `bubble ${who}`;
      wrap.textContent = text;
      const ts = document.createElement("div");
      ts.className = "timestamp";
      ts.textContent = new Date().toLocaleTimeString();
      const container = document.createElement("div");
      container.appendChild(wrap);
      container.appendChild(ts);
      messagesEl.appendChild(container);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function backendUrl(cfg) {
      return `${cfg.scheme}://${cfg.host}:${cfg.port}`;
    }

    async function testBackend() {
      const cfg = getCfg();
      const url = backendUrl(cfg) + "/health";
      const start = performance.now();
      try {
        const res = await fetch(url, { method: "GET" });
        latencyEl.textContent = `${Math.round(performance.now() - start)} ms`;
        if (res.ok) {
          status("status-ok", "Online");
          log(`Health OK ${url}`);
        } else {
          status("status-bad", `Error ${res.status}`);
          log(`Health error ${res.status}`);
        }
      } catch (e) {
        status("status-bad", "Offline");
        log("Health failed: " + e.message);
      }
    }

    async function sendMessage() {
      const msg = promptEl.value.trim();
      if (!msg) return;
      promptEl.value = "";
      addBubble(msg, "me");
      const cfg = getCfg();
      const url = backendUrl(cfg) + "/chat";
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json().catch(() => ({}));
        const reply = data.reply || JSON.stringify(data);
        addBubble(reply, "bot");
        log("Chat OK");
      } catch (e) {
        addBubble("Request failed: " + e.message, "bot");
        log("Chat failed: " + e.message);
      }
    }

    function getCfg() {
      return {
        host: el("host").value || defaultCfg.host,
        port: Number(el("port").value) || defaultCfg.port,
        scheme: el("scheme").value || defaultCfg.scheme,
      };
    }

    function init() {
      const cfg = loadCfg();
      applyCfg(cfg);
      el("save").onclick = () => {
        const newCfg = getCfg();
        saveCfg(newCfg);
        log("Saved backend: " + backendUrl(newCfg));
      };
      el("test").onclick = testBackend;
      el("send").onclick = sendMessage;
      el("clear").onclick = () => { messagesEl.innerHTML = ""; };
      el("quick-hello").onclick = () => { promptEl.value = "Hello!"; sendMessage(); };
      el("quick-help").onclick = () => { promptEl.value = "What can you do?"; sendMessage(); };
      promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      status("status-unknown", "Not tested");
      log("UI ready. Configure backend then tap Test.");
    }

    init();
  </script>
</body>
</html>
